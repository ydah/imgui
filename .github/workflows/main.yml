name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Ruby ${{ matrix.ruby }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        ruby: 
          - "3.2"
          - "3.3"
          - "3.4"
          - "4.0"
          - "head"

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - uses: actions/cache@v4
        with:
          path: tmp/vendor
          key: native-${{ runner.os }}-${{ hashFiles('generator/native-dependencies.yml') }}
      - name: Fetch native dependencies
        run: bundle exec rake vendor:fetch
      - name: Verify native dependency cache
        run: bundle exec rake vendor:verify
      - name: Run Ruby specs
        run: bundle exec rake spec
      - name: Verify generated bindings
        shell: bash
        run: |
          bundle exec rake generate
          git diff --exit-code
      - name: Run native headless smoke test
        run: bundle exec rake native:spec
      - name: Audit generated native symbols
        if: matrix.ruby == '4.0' && runner.os != 'Windows'
        run: bundle exec rake native:audit
      - name: Install Linux integration dependencies
        if: matrix.ruby == '4.0' && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes libglfw3 libgl1-mesa-dev libvulkan1 mesa-vulkan-drivers xvfb
          gem install glfw-ruby sdl3 wgpu --no-document
          ruby generator/update_vendor.rb --checkout sdl:tmp/sdl-source
          cmake -S tmp/sdl-source -B tmp/sdl-build -DSDL_SHARED=ON -DSDL_STATIC=OFF -DSDL_TEST_LIBRARY=OFF
          cmake --build tmp/sdl-build --parallel
          cmake --install tmp/sdl-build --prefix "$PWD/tmp/sdl-install"
      - name: Run backend integration
        if: matrix.ruby == '4.0' && runner.os == 'Linux'
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/tmp/sdl-install/lib
          SDL_VIDEODRIVER: x11
        run: xvfb-run -a bundle exec rake native:integration
      - name: Build platform gem
        if: matrix.ruby == '4.0'
        run: bundle exec rake gem:platform
      - uses: actions/upload-artifact@v4
        if: matrix.ruby == '4.0'
        with:
          name: platform-gem-${{ matrix.os }}
          path: pkg/*.gem

  package:
    name: Package source gem
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true
      - uses: actions/cache@v4
        with:
          path: tmp/vendor
          key: native-${{ runner.os }}-${{ hashFiles('generator/native-dependencies.yml') }}
      - name: Fetch native dependencies
        run: bundle exec rake vendor:fetch
      - name: Verify native dependency cache
        run: bundle exec rake vendor:verify
      - run: bundle exec rake build
      - uses: actions/upload-artifact@v4
        with:
          name: source-gem
          path: pkg/*.gem
